<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420" font-family="PingFang SC,Microsoft YaHei,sans-serif">
  <rect width="900" height="420" fill="#FAFAF8"/>
  <text x="450" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#0A0A0A">数字孪生灾后重建六大案例成效</text>
  <text x="450" y="58" text-anchor="middle" font-size="11" fill="#737373">SIX CASE OUTCOMES — DIGITAL TWIN IN ACTION</text>

  <!-- 柱状图: 6个案例 -->
  <!-- 案例1: 密云水库 -->
  <rect x="60" y="290" width="100" height="0" fill="#002FA7" opacity="0.85">
    <animate attributeName="height" from="0" to="180" dur="0.8s" fill="freeze"/>
    <animate attributeName="y" from="290" to="110" dur="0.8s" fill="freeze"/>
  </rect>
  <text x="110" y="100" text-anchor="middle" font-size="12" font-weight="600" fill="#002FA7">国家级奖</text>
  <text x="110" y="320" text-anchor="middle" font-size="10" fill="#0A0A0A">密云/永定河</text>
  <text x="110" y="338" text-anchor="middle" font-size="9" fill="#737373">洪涝调度</text>

  <!-- 案例2: 遂宁 -->
  <rect x="200" y="290" width="100" height="0" fill="#002FA7" opacity="0.85">
    <animate attributeName="height" from="0" to="200" dur="0.9s" fill="freeze"/>
    <animate attributeName="y" from="290" to="90" dur="0.9s" fill="freeze"/>
  </rect>
  <text x="250" y="80" text-anchor="middle" font-size="12" font-weight="600" fill="#002FA7">0伤亡</text>
  <text x="250" y="320" text-anchor="middle" font-size="10" fill="#0A0A0A">遂宁郪江</text>
  <text x="250" y="338" text-anchor="middle" font-size="9" fill="#737373">超保洪水</text>

  <!-- 案例3: ICF -->
  <rect x="340" y="290" width="100" height="0" fill="#6B3FA0" opacity="0.85">
    <animate attributeName="height" from="0" to="140" dur="0.7s" fill="freeze"/>
    <animate attributeName="y" from="290" to="150" dur="0.7s" fill="freeze"/>
  </rect>
  <text x="390" y="140" text-anchor="middle" font-size="12" font-weight="600" fill="#6B3FA0">↑60-80%</text>
  <text x="390" y="320" text-anchor="middle" font-size="10" fill="#0A0A0A">ICF/FEMA</text>
  <text x="390" y="338" text-anchor="middle" font-size="9" fill="#737373">飓风评估</text>

  <!-- 案例4: 阿苏神社 -->
  <rect x="480" y="290" width="100" height="0" fill="#2A7A2A" opacity="0.85">
    <animate attributeName="height" from="0" to="120" dur="0.6s" fill="freeze"/>
    <animate attributeName="y" from="290" to="170" dur="0.6s" fill="freeze"/>
  </rect>
  <text x="530" y="160" text-anchor="middle" font-size="12" font-weight="600" fill="#2A7A2A">mm级修复</text>
  <text x="530" y="320" text-anchor="middle" font-size="10" fill="#0A0A0A">阿苏神社</text>
  <text x="530" y="338" text-anchor="middle" font-size="9" fill="#737373">地震古建</text>

  <!-- 案例5: 沙特 -->
  <rect x="620" y="290" width="100" height="0" fill="#C27803" opacity="0.85">
    <animate attributeName="height" from="0" to="160" dur="0.75s" fill="freeze"/>
    <animate attributeName="y" from="290" to="130" dur="0.75s" fill="freeze"/>
  </rect>
  <text x="670" y="120" text-anchor="middle" font-size="12" font-weight="600" fill="#C27803">省$210万</text>
  <text x="670" y="320" text-anchor="middle" font-size="10" fill="#0A0A0A">沙特粮仓</text>
  <text x="670" y="338" text-anchor="middle" font-size="9" fill="#737373">地质加固</text>

  <!-- 案例6: 七曲山 -->
  <rect x="760" y="290" width="100" height="0" fill="#B91C1C" opacity="0.85">
    <animate attributeName="height" from="0" to="100" dur="0.5s" fill="freeze"/>
    <animate attributeName="y" from="290" to="190" dur="0.5s" fill="freeze"/>
  </rect>
  <text x="810" y="180" text-anchor="middle" font-size="12" font-weight="600" fill="#B91C1C">5s预警</text>
  <text x="810" y="320" text-anchor="middle" font-size="10" fill="#0A0A0A">七曲山</text>
  <text x="810" y="338" text-anchor="middle" font-size="9" fill="#737373">林火防控</text>

  <!-- 基线 -->
  <line x1="40" y1="290" x2="880" y2="290" stroke="#D4D4D4" stroke-width="1.5"/>
  <text x="450" y="390" text-anchor="middle" font-size="10" fill="#A3A3A3">柱高代表数字孪生介入带来的成效显著度（定性）</text>
</svg>