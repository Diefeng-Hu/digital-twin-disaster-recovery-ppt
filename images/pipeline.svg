<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520" font-family="PingFang SC,Microsoft YaHei,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#002FA7"/>
    </marker>
    <filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.10"/></filter>
  </defs>
  <!-- 背景 -->
  <rect width="900" height="520" rx="0" fill="#FAFAF8"/>
  <!-- 标题 -->
  <text x="450" y="42" text-anchor="middle" font-size="20" font-weight="700" fill="#0A0A0A">数字孪生灾后重建全流程</text>
  <text x="450" y="64" text-anchor="middle" font-size="11" fill="#737373">DIGITAL TWIN DISASTER RECOVERY PIPELINE</text>

  <!-- 5步流程卡片 -->
  <!-- Step 1: 灾后建模 -->
  <rect x="30" y="100" width="150" height="160" rx="0" fill="#E8F2FF" stroke="#5B8DD9" stroke-width="1.5" filter="url(#s)"/>
  <rect x="30" y="100" width="150" height="32" fill="#002FA7"/>
  <text x="105" y="122" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">01 灾后建模</text>
  <text x="105" y="155" text-anchor="middle" font-size="10" font-weight="500" fill="#2B5090">遥感+传感器</text>
  <text x="105" y="172" text-anchor="middle" font-size="10" font-weight="500" fill="#2B5090">快速建孪生</text>
  <text x="105" y="195" text-anchor="middle" font-size="9" fill="#5A7AAA">无人机航拍</text>
  <text x="105" y="210" text-anchor="middle" font-size="9" fill="#5A7AAA">IoT数据融合</text>
  <text x="105" y="225" text-anchor="middle" font-size="9" fill="#5A7AAA">三维实景重构</text>

  <!-- 箭头1 -->
  <line x1="185" y1="180" x2="210" y2="180" stroke="#002FA7" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 2: AI灾损评估 -->
  <rect x="215" y="100" width="150" height="160" rx="0" fill="#E8F2FF" stroke="#5B8DD9" stroke-width="1.5" filter="url(#s)"/>
  <rect x="215" y="100" width="150" height="32" fill="#002FA7"/>
  <text x="290" y="122" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">02 AI灾损评估</text>
  <text x="290" y="155" text-anchor="middle" font-size="10" font-weight="500" fill="#2B5090">深度学习分析</text>
  <text x="290" y="172" text-anchor="middle" font-size="10" font-weight="500" fill="#2B5090">分钟级出报告</text>
  <text x="290" y="195" text-anchor="middle" font-size="9" fill="#5A7AAA">多灾种耦合</text>
  <text x="290" y="210" text-anchor="middle" font-size="9" fill="#5A7AAA">置信度量化</text>
  <text x="290" y="225" text-anchor="middle" font-size="9" fill="#5A7AAA">损失清单输出</text>

  <!-- 箭头2 -->
  <line x1="370" y1="180" x2="395" y2="180" stroke="#002FA7" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 3: 虚拟推演 -->
  <rect x="400" y="100" width="150" height="160" rx="0" fill="#F0E8FC" stroke="#9B6DC8" stroke-width="1.5" filter="url(#s)"/>
  <rect x="400" y="100" width="150" height="32" fill="#6B3FA0"/>
  <text x="475" y="122" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">03 虚拟推演</text>
  <text x="475" y="155" text-anchor="middle" font-size="10" font-weight="500" fill="#4A2070">零成本比选</text>
  <text x="475" y="172" text-anchor="middle" font-size="10" font-weight="500" fill="#4A2070">多方案择优</text>
  <text x="475" y="195" text-anchor="middle" font-size="9" fill="#7A4AAA">工期成本测算</text>
  <text x="475" y="210" text-anchor="middle" font-size="9" fill="#7A4AAA">二次灾害模拟</text>
  <text x="475" y="225" text-anchor="middle" font-size="9" fill="#7A4AAA">基础设施耦合</text>

  <!-- 箭头3 -->
  <line x1="555" y1="180" x2="580" y2="180" stroke="#002FA7" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 4: 重建执行 -->
  <rect x="585" y="100" width="150" height="160" rx="0" fill="#E8F8E8" stroke="#3A9A3A" stroke-width="1.5" filter="url(#s)"/>
  <rect x="585" y="100" width="150" height="32" fill="#2A7A2A"/>
  <text x="660" y="122" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">04 重建执行</text>
  <text x="660" y="155" text-anchor="middle" font-size="10" font-weight="500" fill="#1A5A1A">实时监控施工</text>
  <text x="660" y="172" text-anchor="middle" font-size="10" font-weight="500" fill="#1A5A1A">动态预警调整</text>
  <text x="660" y="195" text-anchor="middle" font-size="9" fill="#5A9A5A">4D工序预判</text>
  <text x="660" y="210" text-anchor="middle" font-size="9" fill="#5A9A5A">进度偏差告警</text>
  <text x="660" y="225" text-anchor="middle" font-size="9" fill="#5A9A5A">资源精准调度</text>

  <!-- 箭头4 -->
  <line x1="740" y1="180" x2="765" y2="180" stroke="#002FA7" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 5: 韧性值守 -->
  <rect x="770" y="100" width="110" height="160" rx="0" fill="#002FA7" filter="url(#s)"/>
  <text x="825" y="130" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">05 韧性值守</text>
  <text x="825" y="155" text-anchor="middle" font-size="9" fill="rgba(255,255,255,.85)">AI年年比对</text>
  <text x="825" y="172" text-anchor="middle" font-size="9" fill="rgba(255,255,255,.85)">异常沉降预警</text>
  <text x="825" y="189" text-anchor="middle" font-size="9" fill="rgba(255,255,255,.85)">终身韧性监测</text>
  <text x="825" y="220" text-anchor="middle" font-size="8" fill="rgba(255,255,255,.55)">一次重建</text>
  <text x="825" y="235" text-anchor="middle" font-size="8" fill="rgba(255,255,255,.55)">终身免疫</text>

  <!-- 反馈回路箭头 -->
  <path d="M825,265 L825,310 Q825,330 805,330 L105,330 Q85,330 85,310 L85,265" fill="none" stroke="#002FA7" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow)"/>
  <text x="450" y="348" text-anchor="middle" font-size="10" font-weight="600" fill="#002FA7">闭环反馈：实时数据回传 → 孪生模型持续优化</text>

  <!-- 底部数据行 -->
  <rect x="30" y="380" width="850" height="1" fill="#E0E0E0"/>
  <text x="450" y="405" text-anchor="middle" font-size="11" font-weight="600" fill="#0A0A0A">关键数据</text>
  
  <!-- 4个KPI -->
  <rect x="55" y="420" width="180" height="70" fill="#F5F5F4"/>
  <text x="145" y="445" text-anchor="middle" font-size="24" font-weight="200" fill="#002FA7">60-80%</text>
  <text x="145" y="468" text-anchor="middle" font-size="10" fill="#737373">灾损评估效率提升</text>

  <rect x="275" y="420" width="180" height="70" fill="#F5F5F4"/>
  <text x="365" y="445" text-anchor="middle" font-size="24" font-weight="200" fill="#002FA7">10min</text>
  <text x="365" y="468" text-anchor="middle" font-size="10" fill="#737373">深圳孪生风险更新周期</text>

  <rect x="495" y="420" width="180" height="70" fill="#F5F5F4"/>
  <text x="585" y="445" text-anchor="middle" font-size="24" font-weight="200" fill="#002FA7">5s</text>
  <text x="585" y="468" text-anchor="middle" font-size="10" fill="#737373">七曲山火情预警</text>

  <rect x="715" y="420" width="160" height="70" fill="#002FA7"/>
  <text x="795" y="445" text-anchor="middle" font-size="24" font-weight="200" fill="#fff">0</text>
  <text x="795" y="468" text-anchor="middle" font-size="10" fill="rgba(255,255,255,.8)">二次灾害损失</text>

  <text x="450" y="510" text-anchor="middle" font-size="9" fill="#A3A3A3">数据来源：ICF/FEMA案例、深圳AI孪生平台、四川七曲山森防系统</text>
</svg>